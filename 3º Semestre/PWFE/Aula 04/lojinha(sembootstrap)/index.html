<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lojinha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="lojo">TechStore</div>
        <ul class="links">
            <li>Home</li>
            <li>Produtos</li>
        </ul>
    </nav>
    <header class="ofertas">
        <h1>As melhores ofertas!</h1>
    </header>
    <main class="container">
      <div class="grid-produto">
        <div class="card">
            <img src="https://samsungbrshop.vtexassets.com/arquivos/ids/278553-1000-auto?v=639076207602700000&width=1000&height=auto&aspect=true" alt="Produtos">
            <h3>Smartphone Samsung S6</h3>
            <p>R$ 5.000,00</p>
            <button class="btn-comprar">Comprar</button>
        </div>
        <div class="card">
            <img src="https://m.media-amazon.com/images/I/51dfg52K-cL._AC_SX342_SY445_QL70_ML2_.jpg" alt="Produtos">
            <h3>PlayStation 5</h3>
            <p>R$ 4.000,00</p>
            <button class="btn-comprar">Comprar</button>
        </div>
      </div>
    </main>
</body>
</html>
